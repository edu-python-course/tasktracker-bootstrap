<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="description" content="Bootstrap templates for a training todo web application">
  <title>Sign Up | Task Tracker</title>
  <link rel="apple-touch-icon" sizes="180x180" href="../img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../img/favicon-16x16.png">
  <link rel="manifest" href="../img/site.webmanifest">
  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/tasktracker.min.css">
</head>
<body>
<nav class="navbar navbar-dark navbar-expand-lg bg-dark fixed-top">
  <div class="container-fluid px-5">
    <a href="" class="navbar-brand">
      <img src="../img/favicon-32x32.png" alt="Task Tracker">
      <span class="align-middle">Task Tracker</span>
    </a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbar" aria-controls="navbar"
            aria-expanded="false">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbar">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item"><a href="" class="nav-link">Sing In</a></li>
        <li class="nav-item"><a href="" class="nav-link">Sing Up</a></li>
        <li class="nav-item"><a href="" class="nav-link">Admin</a></li>
        <li class="nav-item d-sm-inline-block d-lg-none"><a href="" class="nav-link">User Profile</a></li>
        <li class="nav-item d-sm-inline-block d-lg-none"><a href="" class="nav-link">Create Task</a></li>
        <li class="nav-item d-sm-inline-block d-lg-none"><a href="" class="nav-link">Logout</a></li>
        <li class="nav-item dropdown d-none d-lg-inline-block">
          <a href="#" class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <img src="https://i.pravatar.cc/350?u=598da43b" alt="MB" class="rounded-circle"
                 width="auto" height="32">
            <span class="ms-1">Marmadoc Brockhouse</span>
          </a>
          <ul class="dropdown-menu">
            <li><a href="" class="dropdown-item">User Profile</a></li>
            <li><a href="" class="dropdown-item">Create Task</a></li>
            <li>
              <hr class="dropdown-divider">
            </li>
            <li><a href="" class="dropdown-item">Logout</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>
<div class="container vh-100">
  <div class="row d-flex justify-content-center align-items-center h-100">
    <main class="col-10 col-xs-10 col-sm-9 col-md-5 col-xl-4">
      <h1 class="h3 text-uppercase text-center mb-4">Register new user</h1>
      <form>
        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="username" placeholder="Username" name="username">
          <label for="username" class="form-label"><i class="bi bi-person"></i>&nbsp;Username</label>
        </div>
        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="email" placeholder="Email Address" name="email">
          <label for="email" class="form-label"><i class="bi bi-envelope"></i>&nbsp;Email Address</label>
        </div>
        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="first_name" placeholder="First Name" name="first_name">
          <label for="first_name" class="form-label">First Name</label>
        </div>
        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="last_name" placeholder="Last Name" name="last_name">
          <label for="last_name" class="form-label">Last Name</label>
        </div>
        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="passwd1" placeholder="Password" name="password">
          <label for="passwd1" class="form-label"><i class="bi bi-key"></i>&nbsp;Password</label>
        </div>
        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="passwd2" placeholder="Confirm" name="confirm_password">
          <label for="passwd2" class="form-label"><i class="bi bi-lock"></i>&nbsp;Confirm Password</label>
        </div>
        <div class="text-center mb-3">
          Already have an account?&nbsp;<a href="" class="text-decoration-none">Sign In!</a>
        </div>
        <div class="d-flex justify-content-center mb-3">
          <button href="" class="btn btn-lg btn-primary">Sign Up</button>
        </div>
      </form>
    </main>
  </div>
</div>
<script src="../js/bootstrap.bundle.js"></script>
</body>
</html>
